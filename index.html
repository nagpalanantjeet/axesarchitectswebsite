<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axes Architects | Architectural Design & Engineering Services</title>
    <!-- Tailwind CSS CDN Fallback & Official Google Font links -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100&family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Bahnschrift', 'Barlow', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            cursor: none !important; /* Force hide default cursor */
        }
        
        /* Strictly enforce custom cursor on ALL interactive elements and their states */
        a, button, [role="button"], input, select, textarea, .group, [onclick], label {
            cursor: none !important;
        }
        
        /* Ensure cursor stays hidden during clicks/active states */
        *:active, *:focus, *:hover {
            cursor: none !important;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #ffffff;
            border-left: 1px solid #e5e5e5;
        }
        ::-webkit-scrollbar-thumb {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #222222;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
